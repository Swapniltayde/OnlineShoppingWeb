server.port=8081
spring.application.name=OnlineShoppingWeb
spring.datasource.url=jdbc:mysql://localhost:3306/onlineshoppingdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
