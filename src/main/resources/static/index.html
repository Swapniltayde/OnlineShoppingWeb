<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/images/logo.png">
    <title>Online Shopping Web - Best Deals on Electronics & Fashion in India</title>
    <meta name="description" content="Shop high-quality products including the latest MacBooks, Sony Headphones, and more. Experience secure shopping with free delivery across India.">
    <meta name="author" content="Online Shopping Web">
    <meta name="theme-color" content="#1f2937">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://online-shopping-web-five.vercel.app/">
    <meta property="og:title" content="Online Shopping Web - Best Deals in India">
    <meta property="og:description" content="Premium shopping experience for electronics and daily essentials with secure payments and fast delivery.">
    <meta property="og:image" content="https://online-shopping-web-five.vercel.app/images/og-banner.jpg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="Online Shopping Web - Best Deals in India">
    <meta property="twitter:description" content="Premium shopping experience for electronics and daily essentials with secure payments.">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <nav class="navbar" id="navbar"></nav>

    <header class="hero">
        <div class="hero-content">
            <div class="hero-badge">India's Trusted Online Store</div>
            <h1>
                <span>Shop Smarter,</span>
                <span>Save <em>Bigger</em> Every Day</span>
            </h1>
            <p>Explore thousands of products across electronics, fashion & more — with free delivery across India.</p>
            <div class="hero-actions">
                <a href="#products" class="btn btn-primary" style="padding:0.85rem 2rem;font-size:1rem">🛍️ Shop Now</a>
                <a href="/register.html" class="btn btn-outline"
                    style="padding:0.85rem 2rem;font-size:1rem;color:#fff;border-color:rgba(255,255,255,0.3)">Join
                    Free</a>
            </div>
        </div>
    </header>

    <main class="container" id="products">
        <section class="product-section">
            <div class="section-header">
                <h2 class="section-title">🔥 Trending Products</h2>
            </div>

            <div class="controls-bar">
                <input type="text" id="search-input" class="search-input" placeholder="Search products, brands...">
                <div class="category-filter" id="cat-filter"></div>
            </div>

            <div id="product-grid" class="product-grid"></div>
            <div class="pagination" id="pagination"></div>
        </section>
    </main>

    <footer class="footer">
        <p>🛍️ <strong style="color:#fff">Online Shopping Web</strong> &nbsp;|&nbsp; Made in India &nbsp;|&nbsp;
            &copy; 2026 All rights reserved.</p>
    </footer>

    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
</body>

</html>
