<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Online Shopping Web</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <main class="container">
        <h1 class="cart-page-title">🛒 Your Shopping Cart</h1>
        <div class="cart-wrap">
            <div class="cart-items" id="cart-items-container">
                <p>Loading your cart...</p>
            </div>
            <div class="cart-summary">
                <h3>Order Summary</h3>
                <div style="margin-top:1rem">
                    <div class="summary-row"><span>Subtotal</span><span id="summary-subtotal">₹0</span></div>
                    <div class="summary-row"><span>Delivery</span><span id="summary-shipping">₹0</span></div>
                    <div class="summary-row"><span>Discount</span><span style="color:#10b981">-₹0</span></div>
                    <div class="summary-row summary-total"><span>Total</span><span id="summary-total">₹0</span></div>
                    <button id="checkout-btn" class="btn btn-primary" style="width:100%;margin-top:1.25rem;padding:0.85rem;font-size:1rem">
                        Proceed to Checkout →
                    </button>
                    <a href="/index.html" style="display:block;text-align:center;margin-top:0.85rem;font-size:0.85rem;color:#6b7280">← Continue Shopping</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>🛍️ <strong style="color:#fff">Online Shopping Web</strong> &nbsp;|&nbsp; &copy; 2026 All rights reserved.</p>
    </footer>

    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/cart.js"></script>
</body>
</html>
